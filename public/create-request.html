    <!-- Глобальная защита от ошибок расширений -->
    <script>
        // ====================================
        // 🛡️ ГЛОБАЛЬНАЯ ЗАЩИТА ОТ ОШИБОК РАСШИРЕНИЙ v6.7.2
        // ====================================
        
        (function() {
            'use strict';
            
            // Счётчик подавленных ошибок (для отладки)
            var suppressedErrors = 0;
            
            // Список паттернов ошибок расширений
            var extensionErrorPatterns = [
                'message channel closed',
                'Extension context invalidated',
                'chrome-extension://',
                'moz-extension://',
                'content_script.js',
                'Cannot read properties of undefined',
                'reading \'control\'',
                'reading \'runtime\'',
                'sending a message',
                'Receiving end does not exist',
                'Could not establish connection'
            ];
            
            // Проверка, является ли ошибка от расширения
            function isExtensionError(errorMessage, errorStack) {
                if (!errorMessage && !errorStack) return false;
                
                var fullText = (errorMessage || '') + ' ' + (errorStack || '');
                
                return extensionErrorPatterns.some(function(pattern) {
                    return fullText.toLowerCase().includes(pattern.toLowerCase());
                });
            }
            
            // Глобальный обработчик ошибок
            var originalErrorHandler = window.onerror;
            window.onerror = function(message, source, lineno, colno, error) {
                if (isExtensionError(message, error ? error.stack : '')) {
                    suppressedErrors++;
                    console.warn(
                        '[Global] 🛡️ Подавлена ошибка расширения #' + suppressedErrors + ':', 
                        message.substring(0, 100)
                    );
                    return true; // Подавить ошибку
                }
                
                // Передать другие ошибки оригинальному обработчику
                if (originalErrorHandler) {
                    return originalErrorHandler.apply(this, arguments);
                }
                return false;
            };
            
            // Глобальный обработчик unhandled promise rejections
            window.addEventListener('unhandledrejection', function(event) {
                var reason = event.reason;
                var message = reason ? (reason.message || reason.toString()) : '';
                var stack = reason ? reason.stack : '';
                
                if (isExtensionError(message, stack)) {
                    suppressedErrors++;
                    console.warn(
                        '[Global] 🛡️ Подавлен Promise rejection #' + suppressedErrors + ':', 
                        message.substring(0, 100)
                    );
                    event.preventDefault();
                }
            });
            
            // Глобальный обработчик событий focus (где возникает ошибка content_script)
            document.addEventListener('focusin', function(event) {
                // Обернуть в try-catch для предотвращения распространения ошибок расширений
                try {
                    // Код обработки фокуса (если нужен)
                } catch (error) {
                    if (isExtensionError(error.message, error.stack)) {
                        suppressedErrors++;
                        console.warn('[Global] 🛡️ Подавлена ошибка focusin от расширения');
                    }
                }
            }, true); // true = capture phase (до расширений)
            
            // Отчёт о подавленных ошибках (каждые 10 секунд)
            setInterval(function() {
                if (suppressedErrors > 0) {
                    console.log('[Global] 📊 Подавлено ошибок расширений: ' + suppressedErrors);
                }
            }, 10000);
            
            console.log('[Global] 🛡️ Защита от ошибок расширений v6.7.2 активирована');
            console.log('[Global] 📋 Отслеживаются паттерны:', extensionErrorPatterns.length);
        })();
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Отключить автозаполнение на критичных полях (если нужно)
            var sensitiveFields = document.querySelectorAll('input[type="tel"], input[type="text"]');
            sensitiveFields.forEach(function(field) {

                field.setAttribute('data-lpignore', 'true'); // LastPass

        async function takePhoto() {
            console.log('[Photo] 📸 Начало съёмки фото');
            
            try {
                var constraints = {
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }
                };
                
                var stream = await navigator.mediaDevices.getUserMedia(constraints);
                console.log('[Photo] ✅ Доступ к камере получен');
                
                var video = document.createElement('video');
                video.srcObject = stream;
                video.setAttribute('playsinline', '');
                await video.play();
                
                // Ждём загрузки видео
                await new Promise(function(resolve) {
                    video.onloadedmetadata = function() {
                        console.log('[Photo] 📹 Видео загружено');
                        resolve();
                    };
                });
                
                // Создаём canvas
                var canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                var ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0);
                
                // Останавливаем камеру
                stream.getTracks().forEach(function(track) { track.stop(); });
                console.log('[Photo] 🛑 Камера остановлена');
                
                // Получаем base64
                var photoData = canvas.toDataURL('image/jpeg', 0.8);
                console.log('[Photo] 📸 Фото сохранено, размер:', photoData.length);
                
                // Сохраняем в localStorage
                localStorage.setItem('currentPhoto', photoData);
                
                // Синхронизируем с attachedMedia для отправки
                attachedMedia = attachedMedia.filter(function(media) { return media.type !== 'photo'; });
                attachedMedia.push({
                    type: 'photo',
                    data: photoData,
                    timestamp: Date.now()
                });
                localStorage.setItem('requestMedia', JSON.stringify(attachedMedia));
                
                // КРИТИЧНО: Принудительно отображаем превью
                renderMediaPreview();
                
                // Уведомление
                if (typeof showNotification === 'function') {
                    showNotification('Фото сохранено!', 'success');
                }
                
                console.log('[Photo] ✅ Превью должно быть видимым');
                
            } catch (error) {
                console.error('[Photo] ❌ Ошибка съёмки:', error);
                if (typeof showNotification === 'function') {
                    showNotification('Ошибка доступа к камере', 'error');
                } else {
                    alert('Ошибка доступа к камере: ' + error.message);
                }
            }
        }
        
        function recordVideo() {
            console.log('[Video] 🎥 === НАЧАЛО ФУНКЦИИ recordVideo ===');
            
            var input = document.createElement('input');
            input.type = 'file';
            input.accept = 'video/*';
            input.setAttribute('capture', 'environment');
            
            console.log('[Video] 📁 Создан input для выбора файла');
            
            input.onchange = function(e) {
                console.log('[Video] 📁 Файл выбран');
                var file = e.target.files[0];
                if (file) {
                    console.log('[Video] 📊 Информация о файле:');
                    console.log('[Video]   - Имя:', file.name);
                    console.log('[Video]   - Размер:', file.size, 'байт');
                    console.log('[Video]   - Тип:', file.type);
                    
                    var reader = new FileReader();
                    reader.onload = function(event) {
                        console.log('[Video] ✅ Файл прочитан, размер данных:', event.target.result.length);
                        attachedMedia.push({
                            type: 'video',
                            data: event.target.result,
                            timestamp: Date.now()
                        });
                        console.log('[Video] ✅ Видео добавлено в attachedMedia, всего:', attachedMedia.length);
                        renderMediaPreview();
                    };
                    reader.onerror = function(error) {
                        console.error('[Video] ❌ Ошибка чтения файла:', error);
                    };
                    reader.readAsDataURL(file);
                } else {
                    console.log('[Video] ⚠️ Файл не выбран');
                }
            };
            
            console.log('[Video] 🖱️ Открытие диалога выбора файла...');
            input.click();
        }
        
        // Очистка ресурсов
        function cleanupAudioResources() {
            console.log('[Audio] 🧹 === ОЧИСТКА РЕСУРСОВ ===');
            
            // Остановить таймер
            if (audioTimer) {
                console.log('[Audio] 🧹 Очистка таймера...');
                clearInterval(audioTimer);
                audioTimer = null;
                console.log('[Audio] ✅ Таймер очищен');
            }
            
            // Остановить MediaRecorder
            if (mediaRecorder) {
                console.log('[Audio] 🧹 Остановка MediaRecorder...');
                if (mediaRecorder.state !== 'inactive') {
                    try {
                        mediaRecorder.stop();
                        console.log('[Audio] ✅ MediaRecorder остановлен');
                    } catch (e) {
                        console.warn('[Audio] ⚠️ MediaRecorder уже остановлен:', e.message);
                    }
                } else {
                    console.log('[Audio] ℹ️ MediaRecorder уже неактивен');
                }
            }
            mediaRecorder = null;
            
            // Остановить MediaStream
            if (mediaStream) {
                console.log('[Audio] 🧹 Остановка MediaStream...');
                var tracks = mediaStream.getTracks();
                console.log('[Audio] 📊 Найдено треков:', tracks.length);
                tracks.forEach(function(track) {
                    track.stop();
                    console.log('[Audio] ✅ Track остановлен:', track.kind, track.label);
                });
                mediaStream = null;
                console.log('[Audio] ✅ MediaStream очищен');
            }
            
            // Сбросить флаги
            console.log('[Audio] 🧹 Сброс флагов...');
            isRecording = false;
            window.isRecording = false;
            audioChunks = [];
            console.log('[Audio] ✅ Флаги сброшены');
            
            console.log('[Audio] ✅ Ресурсы очищены');
        }
        
        async function recordAudio() {
            console.log('[Audio] 🎤 === НАЧАЛО ФУНКЦИИ recordAudio ===');
            
            var audioBtn = document.getElementById('audioRecordBtn');
            
            if (!audioBtn) {
                console.error('[Audio] ❌ Кнопка #audioRecordBtn не найдена!');
                return;
            }
            
            // Если идёт запись - остановить
            if (isRecording) {
                console.log('[Audio] ⏹️ Уже идёт запись, остановка...');
                stopAudioRecording();
                return;
            }
            
            try {
                // КРИТИЧНО: Полная очистка перед началом
                cleanupAudioResources();
                
                console.log('[Audio] 📡 Запрос доступа к микрофону...');
                
                // Запросить доступ к микрофону
                try {
                    mediaStream = await navigator.mediaDevices.getUserMedia({ 
                        audio: {
                            echoCancellation: true,
                            noiseSuppression: true,
                            sampleRate: 44100
                        } 
                    });
                    console.log('[Audio] ✅ Доступ к микрофону получен');
                } catch (micError) {
                    console.error('[Audio] ❌ Отказано в доступе к микрофону:', micError);
                    showNotification('❌ Разрешите доступ к микрофону в настройках браузера', 'error');
                    cleanupAudioResources();
                    return;
                }
                
                // Определить поддерживаемый MIME type
                var mimeTypes = [
                    'audio/webm;codecs=opus',
                    'audio/webm',
                    'audio/ogg;codecs=opus',
                    'audio/mp4',
                    'audio/mpeg'
                ];
                
                var selectedMimeType = '';
                for (var i = 0; i < mimeTypes.length; i++) {
                    if (MediaRecorder.isTypeSupported(mimeTypes[i])) {
                        selectedMimeType = mimeTypes[i];
                        console.log('[Audio] ✅ Используется MIME type:', selectedMimeType);
                        break;
                    }
                }
                
                if (!selectedMimeType) {
                    selectedMimeType = 'audio/webm';
                    console.warn('[Audio] ⚠️ Fallback на audio/webm');
                }
                
                // Создать MediaRecorder
                mediaRecorder = new MediaRecorder(mediaStream, { 
                    mimeType: selectedMimeType,
                    audioBitsPerSecond: 128000
                });
                
                audioChunks = [];
                
                // Обработчик данных
                mediaRecorder.ondataavailable = function(event) {
                    if (event.data && event.data.size > 0) {
                        audioChunks.push(event.data);
                        console.log('[Audio] 📦 Chunk:', event.data.size, 'байт (всего:', audioChunks.length + ')');
                    }
                };
                
                // Обработчик остановки
                mediaRecorder.onstop = function() {
                    console.log('[Audio] ⏹️ MediaRecorder остановлен');
                    console.log('[Audio] 📦 Всего chunks:', audioChunks.length);
                    
                    // Очистить таймер
                    if (audioTimer) {
                        clearInterval(audioTimer);
                        audioTimer = null;
                    }
                    
                    if (audioChunks.length === 0) {
                        console.error('[Audio] ❌ Нет данных для сохранения');
                        showNotification('❌ Не удалось записать аудио', 'error');
                        cleanupAudioResources();
                        
                        // Сбросить UI
                        audioBtn.textContent = '🎤 Аудио';
                        audioBtn.classList.remove('recording');
                        return;
                    }
                    
                    // Создать Blob
                    var audioBlob = new Blob(audioChunks, { type: selectedMimeType });
                    console.log('[Audio] 📦 Blob создан:', audioBlob.size, 'байт, тип:', audioBlob.type);
                    
                    // Сохранить аудио
                    saveAudioRecording(audioBlob, selectedMimeType, audioDuration).then(function() {
                        // Очистить ресурсы
                        cleanupAudioResources();
                        
                        // Сбросить UI
                        audioBtn.textContent = '🎤 Аудио';
                        audioBtn.classList.remove('recording');
                    }).catch(function(error) {
                        console.error('[Audio] ❌ Ошибка сохранения:', error);
                        showNotification('❌ Ошибка сохранения аудио', 'error');
                        cleanupAudioResources();
                        audioBtn.textContent = '🎤 Аудио';
                        audioBtn.classList.remove('recording');
                    });
                };
                
                // Обработчик ошибок
                mediaRecorder.onerror = function(error) {
                    console.error('[Audio] ❌ MediaRecorder error:', error);
                    showNotification('❌ Ошибка записи аудио', 'error');
                    cleanupAudioResources();
                    audioBtn.textContent = '🎤 Аудио';
                    audioBtn.classList.remove('recording');
                };
                
                // Начать запись
                mediaRecorder.start(100); // timeslice 100ms
                isRecording = true;
                window.isRecording = true;
                audioStartTime = Date.now();
                audioDuration = 0;
                
                console.log('[Audio] ▶️ Запись началась');
                audioBtn.classList.add('recording');
                audioBtn.textContent = '⏹️ Остановить (0с)';
                
                // Таймер
                audioTimer = setInterval(function() {
                    audioDuration = Math.floor((Date.now() - audioStartTime) / 1000);
                    audioBtn.textContent = '⏹️ Остановить (' + audioDuration + 'с)';
                    
                    // Автостоп на 60 секундах
                    if (audioDuration >= 60) {
                        console.log('[Audio] ⏰ Достигнута максимальная длительность (60с)');
                        stopAudioRecording();
                        showNotification('⏰ Достигнута максимальная длительность (60 сек)', 'info');
                    }
                }, 1000);
                
                console.log('[Audio] ✅ Таймер запущен');
                
            } catch (error) {
                console.error('[Audio] ❌ КРИТИЧЕСКАЯ ОШИБКА:', error);
                console.error('[Audio] Stack:', error.stack);
                showNotification('❌ Ошибка: ' + error.message, 'error');
                cleanupAudioResources();
                audioBtn.textContent = '🎤 Аудио';
                audioBtn.classList.remove('recording');
            }
        }
        
        function stopAudioRecording() {
            console.log('[Audio] 🛑 === ОСТАНОВКА ЗАПИСИ ===');
            
            var audioBtn = document.getElementById('audioRecordBtn');
            
            if (!audioBtn) {
                console.warn('[Audio] ⚠️ Кнопка не найдена при остановке');
            }
            
            // Очистить таймер СРАЗУ
            if (audioTimer) {
                console.log('[Audio] 🧹 Очистка таймера...');
                clearInterval(audioTimer);
                audioTimer = null;
                console.log('[Audio] ✅ Таймер очищен');
            } else {
                console.log('[Audio] ℹ️ Таймер не был установлен');
            }
            
            // Остановить MediaRecorder
            if (mediaRecorder) {
                console.log('[Audio] 📊 MediaRecorder state:', mediaRecorder.state);
                if (mediaRecorder.state !== 'inactive') {
                    try {
                        console.log('[Audio] 🛑 Вызов mediaRecorder.stop()...');
                        mediaRecorder.stop();
                        console.log('[Audio] ✅ MediaRecorder.stop() вызван');
                    } catch (error) {
                        console.error('[Audio] ❌ Ошибка остановки MediaRecorder:', error);
                    }
                } else {
                    console.log('[Audio] ℹ️ MediaRecorder уже неактивен');
                }
            } else {
                console.log('[Audio] ℹ️ MediaRecorder не был создан');
            }
            
            // Сбросить флаг
            console.log('[Audio] 🔄 Сброс флагов...');
            isRecording = false;
            window.isRecording = false;
            console.log('[Audio] ✅ Флаги сброшены');
            
            console.log('[Audio] 🛑 Остановка завершена');
        }
        
        /**
         * Сохранение записанного аудио
         */
        async function saveAudioRecording(blob, mimeType, durationSeconds) {
            return new Promise(function(resolve, reject) {
                try {
                    // Конвертировать в Base64
                    var reader = new FileReader();
                    
                    reader.onloadend = function() {
                        var base64Audio = reader.result;
                        console.log('[Audio] ✅ Base64 создан:', base64Audio.length, 'символов');
                        
                        // Определить расширение файла
                        var extension = getAudioExtension(mimeType);
                        var filename = 'audio_' + Date.now() + '.' + extension;
                        
                        // Создать объект аудио
                        var audioFile = {
                            type: 'audio',
                            name: filename,
                            mimeType: mimeType,
                            data: base64Audio,
                            size: blob.size,
                            duration: durationSeconds || 0,
                            timestamp: Date.now()
                        };
                        
                        // Добавить в attachedMedia
                        attachedMedia.push(audioFile);
                        
                        // Сохранить в localStorage
                        var requestMedia = JSON.parse(localStorage.getItem('requestMedia') || '[]');
                        requestMedia.push(audioFile);
                        localStorage.setItem('requestMedia', JSON.stringify(requestMedia));
                        
                        console.log('[Audio] ✅ Аудио сохранено в localStorage');
                        console.log('[Audio] 📊 Всего аудио:', requestMedia.length);
                        
                        // Обновить превью в UI
                        renderMediaPreview();
                        
                        // Показать уведомление
                        showSuccessNotification('Аудио записано (' + durationSeconds + 'с, ' + formatFileSize(blob.size) + ')');
                        
                        resolve();
                    };
                    
                    reader.onerror = function(error) {
                        console.error('[Audio] ❌ Ошибка FileReader:', error);
                        reject(error);
                    };
                    
                    reader.readAsDataURL(blob);
                    
                } catch (error) {
                    console.error('[Audio] ❌ Ошибка сохранения:', error);
                    reject(error);
                }
            });
        }
        
        /**
         * Получить расширение файла по MIME type
         */
        function getAudioExtension(mimeType) {
            if (mimeType.includes('webm')) return 'webm';
            if (mimeType.includes('ogg')) return 'ogg';
            if (mimeType.includes('mp4')) return 'm4a';
            if (mimeType.includes('mpeg')) return 'mp3';
            return 'audio';
        }
        
        /**
         * Форматирование размера файла
         */
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            var k = 1024;
            var sizes = ['Bytes', 'KB', 'MB'];
            var i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }
        
        /**
         * Показать уведомление
         */
        function showNotification(message, type, duration) {
            type = type || 'info';
            duration = duration || 3000;
            
            // Удалить предыдущие уведомления
            var existingToasts = document.querySelectorAll('.toast');
            existingToasts.forEach(function(toast) { toast.remove(); });
            
            var toast = document.createElement('div');
            toast.className = 'toast toast-' + type;
            
            var icons = {
                success: '✓',
                error: '✕',
                warning: '⚠',
                info: 'ℹ'
            };
            
            toast.innerHTML = '<span class="toast-icon">' + (icons[type] || icons.info) + '</span><span class="toast-message">' + message + '</span>';
            
            document.body.appendChild(toast);
            
            setTimeout(function() { toast.classList.add('show'); }, 10);
            
            setTimeout(function() {
                toast.classList.remove('show');
                setTimeout(function() { toast.remove(); }, 300);
            }, duration);
        }
        
        function renderMediaPreview() {
            console.log('[Media] 🖼️ Рендеринг превью медиа');
            
            var photoData = localStorage.getItem('currentPhoto');
            var audioData = localStorage.getItem('currentAudio');
            
            var photoPreview = document.getElementById('photoPreview');
            var audioPreview = document.getElementById('audioPreview');
            var deletePhotoBtn = document.getElementById('deletePhotoBtn');
            var deleteAudioBtn = document.getElementById('deleteAudioBtn');
            
            // === ФОТО ===
            if (photoData && photoPreview) {
                console.log('[Photo] 📸 Фото найдено в localStorage, размер:', photoData.length);
                
                photoPreview.src = photoData;
                
                // КРИТИЧНО: Принудительно делаем видимым
                photoPreview.style.display = 'block';
                photoPreview.style.opacity = '1';
                photoPreview.style.visibility = 'visible';
                photoPreview.style.maxWidth = '100%';
                photoPreview.style.height = 'auto';
                photoPreview.style.borderRadius = '12px';
                photoPreview.style.marginBottom = '10px';
                
                if (deletePhotoBtn) {
                    deletePhotoBtn.style.display = 'block';
                    deletePhotoBtn.style.opacity = '1';
                    deletePhotoBtn.style.visibility = 'visible';
                }
                
                console.log('[Photo] ✅ Превью установлено и видимо');
            } else {
                if (photoPreview) {
                    photoPreview.style.display = 'none';
                    photoPreview.style.opacity = '0';
                }
                if (deletePhotoBtn) {
                    deletePhotoBtn.style.display = 'none';
                    deletePhotoBtn.style.opacity = '0';
                }
                console.log('[Photo] ℹ️ Фото отсутствует');
            }
            
            // === АУДИО ===
            if (audioData && audioPreview) {
                console.log('[Audio] 🎵 Аудио найдено в localStorage');
                
                audioPreview.src = audioData;
                audioPreview.style.display = 'block';
                audioPreview.style.opacity = '1';
                audioPreview.style.visibility = 'visible';
                
                if (deleteAudioBtn) {
                    deleteAudioBtn.style.display = 'block';
                    deleteAudioBtn.style.opacity = '1';
                    deleteAudioBtn.style.visibility = 'visible';
                }
                
                console.log('[Audio] ✅ Аудио-плеер установлен и видим');
            } else {
                if (audioPreview) {
                    audioPreview.style.display = 'none';
                    audioPreview.style.opacity = '0';
                }
                if (deleteAudioBtn) {
                    deleteAudioBtn.style.display = 'none';
                    deleteAudioBtn.style.opacity = '0';
                }
                console.log('[Audio] ℹ️ Аудио отсутствует');
            }
        }
        
        function deletePhoto() {
            console.log('[Photo] 🗑️ Удаление фото');
            localStorage.removeItem('currentPhoto');
            
            // Удаляем фото из attachedMedia и синхронизируем
            attachedMedia = attachedMedia.filter(function(media) { return media.type !== 'photo'; });
            localStorage.setItem('requestMedia', JSON.stringify(attachedMedia));
            
            renderMediaPreview();
            
            if (typeof showNotification === 'function') {
                showNotification('Фото удалено', 'success');
            }
        }
        
        function removeMedia(index) {
            console.log('[Media] 🗑️ === НАЧАЛО ФУНКЦИИ removeMedia ===');
            console.log('[Media] 📊 Параметры:');
            console.log('[Media]   - Индекс:', index);
            console.log('[Media]   - Всего до удаления:', attachedMedia.length);
            
            if (index < 0 || index >= attachedMedia.length) {
                console.error('[Media] ❌ Неверный индекс:', index);
                return;
            }
            
            // Удалить из массива
            var removed = attachedMedia.splice(index, 1);
            console.log('[Media] ✅ Удалён файл:', removed[0] ? (removed[0].name || removed[0].type) : 'unknown');
            console.log('[Media] 📊 Осталось файлов:', attachedMedia.length);
            
            // КРИТИЧЕСКИ ВАЖНО: Обновить localStorage
            console.log('[Media] 💾 Обновление localStorage...');
            localStorage.setItem('requestMedia', JSON.stringify(attachedMedia));
            console.log('[Media] ✅ localStorage обновлён');
            
            // Обновить UI
            console.log('[Media] 🎨 Обновление UI...');
            renderMediaPreview();
            
            // Показать уведомление
            showNotification('Файл удалён', 'success', 2000);
            console.log('[Media] ✅ Удаление завершено');
        }
        
        function getAttachedMedia() {
            return attachedMedia;
        }
        
        // Добавить CSS для анимации спиннера
        var style = document.createElement('style');
        style.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
        document.head.appendChild(style);
        
        // ====================================
        // 🚀 ЗАПУСК ИНИЦИАЛИЗАЦИИ (дополнительные проверки)
        // ====================================
        
        // Вариант 2: Если DOM уже загружен (при навигации через SPA)
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            console.log('[Init] DOM уже загружен, запуск инициализации...');
            // Проверить авторизацию перед инициализацией
            if (typeof isAuthenticated === 'function' && isAuthenticated()) {
                setTimeout(function() {
                    if (typeof initializeCreateRequestPage === 'function') {
                        initializeCreateRequestPage();
                    }
                }, 100);
            }
        }
        
        // Вариант 3: При входе на страницу через window.onload (запасной)
        window.addEventListener('load', function() {
            console.log('[Init] window.load - проверка инициализации...');
            var mediaPreview = document.getElementById('mediaPreview');
            if (mediaPreview && mediaPreview.children.length === 0 && attachedMedia.length > 0) {
                console.warn('[Init] ⚠️ Медиа не отображены, повторная инициализация...');
                renderMediaPreview();
                initializeCreateRequestPage();
            }
        });
        
        // Вариант 4: При показе страницы (для мобильных браузеров)
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                console.log('[Init] Страница стала видимой, проверка...');
                // Перезагрузить медиа, если они пропали
                var mediaPreview = document.getElementById('mediaPreview');
                if (mediaPreview && mediaPreview.children.length === 0 && attachedMedia.length > 0) {
                    renderMediaPreview();
                }
                // Переинициализировать обработчики
                setTimeout(function() {
                    initializeCreateRequestPage();
                }, 100);
            }
        });
    </script>
