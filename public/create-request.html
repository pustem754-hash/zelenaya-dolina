    <!-- Глобальная защита от ошибок расширений -->
    <script>
        // ====================================
        // 🛡️ ГЛОБАЛЬНАЯ ЗАЩИТА ОТ ОШИБОК РАСШИРЕНИЙ v6.8.0
        // ====================================
        
        (function() {
            'use strict';
            
            // Счётчик подавленных ошибок (для отладки)
            let suppressedErrors = 0;
            
            // Список паттернов ошибок расширений
            const extensionErrorPatterns = [
                'message channel closed',
                'Extension context invalidated',
                'chrome-extension://',
                'moz-extension://',
                'content_script.js',
                'Cannot read properties of undefined',
                'reading \'control\'',
                'reading \'runtime\'',
                'sending a message',
                'Receiving end does not exist',
                'Could not establish connection'
            ];
            
            // Проверка, является ли ошибка от расширения
            function isExtensionError(errorMessage, errorStack) {
                if (!errorMessage && !errorStack) return false;
                
                const fullText = (errorMessage || '') + ' ' + (errorStack || '');
                
                return extensionErrorPatterns.some(pattern => 
                    fullText.toLowerCase().includes(pattern.toLowerCase())
                );
            }
            
            // Глобальный обработчик ошибок
            const originalErrorHandler = window.onerror;
            window.onerror = function(message, source, lineno, colno, error) {
                if (isExtensionError(message, error ? error.stack : '')) {
                    suppressedErrors++;
                    console.warn(
                        `[Global] 🛡️ Подавлена ошибка расширения #${suppressedErrors}:`, 
                        message.substring(0, 100)
                    );
                    return true; // Подавить ошибку
                }
                
                // Передать другие ошибки оригинальному обработчику
                if (originalErrorHandler) {
                    return originalErrorHandler.apply(this, arguments);
                }
                return false;
            };
            
            // Глобальный обработчик unhandled promise rejections
            window.addEventListener('unhandledrejection', function(event) {
                const reason = event.reason;
                const message = reason ? (reason.message || reason.toString()) : '';
                const stack = reason ? reason.stack : '';
                
                if (isExtensionError(message, stack)) {
                    suppressedErrors++;
                    console.warn(
                        `[Global] 🛡️ Подавлен Promise rejection #${suppressedErrors}:`, 
                        message.substring(0, 100)
                    );
                    event.preventDefault();
                }
            });
            
            // Глобальный обработчик событий focus (где возникает ошибка content_script)
            document.addEventListener('focusin', function(event) {
                // Обернуть в try-catch для предотвращения распространения ошибок расширений
                try {
                    // Код обработки фокуса (если нужен)
                } catch (error) {
                    if (isExtensionError(error.message, error.stack)) {
                        suppressedErrors++;
                        console.warn('[Global] 🛡️ Подавлена ошибка focusin от расширения');
                    }
                }
            }, true); // true = capture phase (до расширений)
            
            // Отчёт о подавленных ошибках (каждые 10 секунд)
            setInterval(function() {
                if (suppressedErrors > 0) {
                    console.log(`[Global] 📊 Подавлено ошибок расширений: ${suppressedErrors}`);
                }
            }, 10000);
            
            console.log('[Global] 🛡️ Защита от ошибок расширений v6.8.0 активирована');
            console.log('[Global] 📋 Отслеживаются паттерны:', extensionErrorPatterns.length);
        })();
    </script>

            // Очистить старые ресурсы

            // Загрузить существующие медиа
            console.log('[Init] 📦 Загрузка существующих медиа из localStorage...');
            const savedMedia = JSON.parse(localStorage.getItem('requestMedia') || '[]');
            console.log('[Init] 📦 Найдено медиа в localStorage:', savedMedia.length);
            
            attachedMedia = savedMedia.filter(media => {
                if (!media.timestamp) {
                    console.log('[Init] ⚠️ Медиа без timestamp пропущено:', media.type);
                    return false;
                }
                const age = Date.now() - media.timestamp;
                const isValid = age < 24 * 60 * 60 * 1000; // 24 часа
                if (!isValid) {
                    console.log('[Init] ⚠️ Старое медиа пропущено (возраст:', Math.round(age / 1000 / 60 / 60), 'ч):', media.type);
                }
                return isValid;
            });
            
            if (attachedMedia.length !== savedMedia.length) {
                localStorage.setItem('requestMedia', JSON.stringify(attachedMedia));
                console.log('[Init] 🗑️ Удалено старых медиа:', savedMedia.length - attachedMedia.length);

        async function takePhoto() {
            console.log('[Photo] 📸 Начало съёмки фото');
            
            try {
                const constraints = {
                    video: {
                        facingMode: 'environment', // Задняя камера
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }
                };
                
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                console.log('[Photo] ✅ Доступ к камере получен');
                
                const video = document.createElement('video');
                video.srcObject = stream;
                video.setAttribute('playsinline', ''); // Важно для iOS!
                await video.play();
                
                // Ждём загрузки видео
                await new Promise(resolve => {
                    video.onloadedmetadata = () => {
                        console.log('[Photo] 📹 Видео загружено');
                        resolve();
                    };
                });
                
                // Создаём canvas
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0);
                
                // Останавливаем камеру
                stream.getTracks().forEach(track => track.stop());
                console.log('[Photo] 🛑 Камера остановлена');
                
                // Получаем base64
                const photoData = canvas.toDataURL('image/jpeg', 0.8);
                console.log('[Photo] 📸 Фото сохранено, размер:', photoData.length);
                
                // Сохраняем в localStorage
                localStorage.setItem('currentPhoto', photoData);
                
                // Синхронизируем с attachedMedia для отправки
                attachedMedia = attachedMedia.filter(media => media.type !== 'photo');
                attachedMedia.push({
                    type: 'photo',
                    data: photoData,
                    timestamp: Date.now()
                });
                localStorage.setItem('requestMedia', JSON.stringify(attachedMedia));
                
                // КРИТИЧНО: Принудительно отображаем превью
                renderMediaPreview();
                
                // Уведомление
                if (typeof showNotification === 'function') {
                    showNotification('Фото сохранено!', 'success');
                }
                
                console.log('[Photo] ✅ Превью должно быть видимым');
                
            } catch (error) {
                console.error('[Photo] ❌ Ошибка съёмки:', error);
                if (typeof showNotification === 'function') {
                    showNotification('Ошибка доступа к камере', 'error');
                } else {
                    alert('Ошибка доступа к камере: ' + error.message);
                }
            }
        }

        /**
         * Сохранение записанного аудио
         */
        async function saveAudioRecording(blob, mimeType, durationSeconds) {
            return new Promise((resolve, reject) => {
                try {
                    // Конвертировать в Base64
                    const reader = new FileReader();
                    
                    reader.onloadend = function() {
                        const base64Audio = reader.result;
                        console.log(`[Audio] ✅ Base64 создан: ${base64Audio.length} символов`);
                        
                        // Определить расширение файла
                        const extension = getAudioExtension(mimeType);
                        const filename = `audio_${Date.now()}.${extension}`;
                        
                        // Создать объект аудио
                        const audioFile = {
                            type: 'audio',
                            name: filename,
                            mimeType: mimeType,
                            data: base64Audio,
                            size: blob.size,
                            duration: durationSeconds || 0,
                            timestamp: Date.now()
                        };
                        
                        // Добавить в attachedMedia
                        attachedMedia.push(audioFile);
                        
                        // Сохранить в localStorage
                        let requestMedia = JSON.parse(localStorage.getItem('requestMedia') || '[]');
                        requestMedia.push(audioFile);
                        localStorage.setItem('requestMedia', JSON.stringify(requestMedia));
                        
                        console.log('[Audio] ✅ Аудио сохранено в localStorage');
                        console.log(`[Audio] 📊 Всего аудио: ${requestMedia.length}`);
                        
                        // Обновить превью в UI
                        renderMediaPreview();
                        
                        // Показать уведомление
                        showSuccessNotification(`Аудио записано (${durationSeconds}с, ${formatFileSize(blob.size)})`);
                        
                        resolve();
                    };
                    
                    reader.onerror = function(error) {
                        console.error('[Audio] ❌ Ошибка FileReader:', error);
                        reject(error);
                    };
                    
                    reader.readAsDataURL(blob);
                    
                } catch (error) {
                    console.error('[Audio] ❌ Ошибка сохранения:', error);
                    reject(error);
                }
            });
        }
        
        /**
         * Получить расширение файла по MIME type
         */
        function getAudioExtension(mimeType) {
            if (mimeType.includes('webm')) return 'webm';
            if (mimeType.includes('ogg')) return 'ogg';
            if (mimeType.includes('mp4')) return 'm4a';
            if (mimeType.includes('mpeg')) return 'mp3';
            return 'audio';
        }
        
        /**
         * Конвертация Blob в Base64
         */
        function blobToBase64(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }
        
        /**
         * Форматирование размера файла
         */
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        }
