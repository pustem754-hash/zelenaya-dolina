  <!-- Дерево -->
  <ellipse cx="300" cy="320" rx="60" ry="50" fill="#4CAF50" opacity="0.9"/>
  <ellipse cx="270" cy="310" rx="45" ry="40" fill="#66BB6A" opacity="0.8"/>
  <ellipse cx="330" cy="310" rx="45" ry="40" fill="#66BB6A" opacity="0.8"/>
  <rect x="290" y="340" width="20" height="40" fill="#795548"/>
  
  <!-- Стрелка вверх -->
  <path d="M 480,100 L 550,140 L 520,140 L 520,180 L 440,180 L 440,140 L 410,140 Z" fill="#4CAF50"/>
  
  <!-- Текст -->
  <text x="300" y="480" font-family="Arial, sans-serif" font-size="45" font-weight="bold" fill="#4CAF50" text-anchor="middle">УК ЗЕЛЁНАЯ ДОЛИНА</text>
