    <rect x="180" y="265" width="15" height="15" rx="2"/>
  </g>
  <polygon points="120,180 170,140 220,180" fill="#1B5E20"/>
  
  <!-- Правое здание -->
  <rect x="280" y="120" width="120" height="240" fill="#2E7D32" rx="5"/>
  <g fill="white">
    <rect x="295" y="135" width="15" height="15" rx="2"/>
    <rect x="325" y="135" width="15" height="15" rx="2"/>
    <rect x="355" y="135" width="15" height="15" rx="2"/>
    <rect x="295" y="165" width="15" height="15" rx="2"/>
    <rect x="325" y="165" width="15" height="15" rx="2"/>
    <rect x="355" y="165" width="15" height="15" rx="2"/>
    <rect x="295" y="195" width="15" height="15" rx="2"/>
    <rect x="325" y="195" width="15" height="15" rx="2"/>
    <rect x="355" y="195" width="15" height="15" rx="2"/>
    <rect x="295" y="225" width="15" height="15" rx="2"/>
    <rect x="325" y="225" width="15" height="15" rx="2"/>
    <rect x="355" y="225" width="15" height="15" rx="2"/>
    <rect x="295" y="255" width="15" height="15" rx="2"/>
