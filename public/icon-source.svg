  <ellipse cx="300" cy="380" rx="220" ry="40" fill="none" stroke="#4CAF50" stroke-width="12"/>
  
  <!-- Левое здание -->
  <rect x="120" y="180" width="100" height="180" fill="#2E7D32" rx="5"/>
  <g fill="white">
    <rect x="130" y="190" width="15" height="15" rx="2"/>
    <rect x="155" y="190" width="15" height="15" rx="2"/>
    <rect x="180" y="190" width="15" height="15" rx="2"/>
