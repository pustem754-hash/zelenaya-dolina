<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Вход - УК Зелёная долина</title>
    
    <!-- PWA Meta -->
    <meta name="theme-color" content="#2E7D32">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192x192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icon-192x192.png">
    
    <!-- CSS для стабилизации -->
    <link rel="stylesheet" href="css/mobile-stabilizer.css">
    <link rel="stylesheet" href="css/mobile-fix.css">
    
    <style>
        :root {
            --primary-green: #2E7D32;
            --primary-green-hover: #4CAF50;
            --text-light: #ffffff;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--primary-green-hover) 0%, var(--primary-green) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .logo-icon {
            width: 64px;
            height: 64px;
            border-radius: 12px;
            object-fit: contain;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #333;
        }
        
        p {
            color: #666;
            margin-bottom: 30px;
        }
        
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px !important; /* КРИТИЧНО для iOS - запрет зума */
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 2px;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: var(--primary-green);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            min-height: 48px;
        }
        
        button:hover {
            background: var(--primary-green-hover);
        }
        
        button:active {
            transform: scale(0.98);
        }
    </style>
    
    <script src="auth.js"></script>
</head>
<body>
    <div class="login-container">
        <div class="logo-container">
            <img src="icon-192x192.png" alt="УК Зелёная долина" class="logo-icon">
            <h1>УК «Зелёная долина»</h1>
        </div>
        <p>Введите 4-значный код для входа</p>
        
        <form id="loginForm">
            <input type="tel" 
                   id="accessCode" 
                   placeholder="0000" 
                   maxlength="4" 
                   pattern="[0-9]*" 
                   inputmode="numeric" 
                   autocomplete="one-time-code"
                   required 
                   autofocus>
            <button type="submit">ВОЙТИ</button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            console.log('[Login] 🔐 Инициализация новой системы входа');
            
            // КРИТИЧНО: Очистка старых ключей для разрыва цикла
            localStorage.removeItem('isAuthenticated');
            localStorage.removeItem('authCode');
            localStorage.removeItem('authToken');
            
            const form = document.getElementById('loginForm');
            const input = document.getElementById('accessCode');
            
            if (!form || !input) {
                console.error('[Login] ❌ Элементы формы не найдены');
                return;
            }
            
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const code = (input.value || '').trim();
                
                if (!/^\d{4}$/.test(code)) {
                    alert('Введите 4-значный код');
                    return;
                }
                
                console.log('[Login] 📥 Вход с кодом:', code);
                
                // Проверка доступности saveAuth
                if (typeof saveAuth === 'function') {
                    saveAuth(code);
                    console.log('[Login] ✅ Авторизация сохранена, редирект...');
                    window.location.replace('index.html'); // replace вместо href
                } else {
                    console.error('[Login] ❌ КРИТИЧЕСКАЯ ОШИБКА: saveAuth не найдена!');
                    alert('Ошибка: функция авторизации не загружена. Обновите страницу.');
                }
            });
            
            console.log('[Login] ✅ Обработчик формы установлен (без старого кода)');
        });

        // Service Worker регистрация
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/zelenaya-dolina/sw.js', {
                    scope: '/zelenaya-dolina/'
                })
                .then(reg => console.log('[Login] ✅ SW зарегистрирован'))
                .catch(err => console.error('[Login] ❌ SW ошибка:', err));
            });
        }
    </script>
</body>
</html>
