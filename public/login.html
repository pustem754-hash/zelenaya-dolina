<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Вход - УК Зелёная долина v6.8.0</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="./icon-48x48.png?v=6.8.0">
    <link rel="icon" type="image/png" sizes="192x192" href="./icon-192x192.png?v=6.8.0">
    <link rel="apple-touch-icon" sizes="180x180" href="./icon-180x180.png?v=6.8.0">
    <meta name="theme-color" content="#2E7D32">
    <style>
        :root {
            --primary-green: #2E7D32;
            --primary-green-hover: #4CAF50;
            --dark-green: #1B5E20;
            --light-green: #d5f4e6;
            --text-light: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--primary-green-hover) 0%, var(--primary-green) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #333;
        }
        p {
            color: #666;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 18px;
            text-align: center;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        input:focus {
            outline: none;
            border-color: var(--primary-green-hover);
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary-green-hover) 0%, var(--primary-green) 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { opacity: 0.9; }
        .error {
            color: #f44336;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🏡 УК «Зелёная долина»</h1>
        <p>Введите код для входа</p>
        <input type="tel" id="accessCode" placeholder="Введите код" maxlength="10" autofocus>
        <button onclick="checkCode()">Войти</button>
        <div class="error" id="error">Неверный код доступа</div>
    </div>

    <script>
        (function initLogin() {
            const input = document.getElementById('accessCode');
            const errorBox = document.getElementById('error');
            const validCodes = ['9550', '2364'];
            const showError = (msg) => {
                if (!errorBox) return;
                errorBox.textContent = msg || 'Неверный код доступа';
                errorBox.style.display = 'block';
                setTimeout(() => { errorBox.style.display = 'none'; }, 3000);
            };
            const doLogin = () => {
                const code = (input?.value || '').trim();
                if (!code) {
                    showError('Введите код');
                    return;
                }
                if (!validCodes.includes(code)) {
                    showError('Неверный код доступа');
                    return;
                }
                localStorage.setItem('authCode', code);
                localStorage.setItem('isAuthenticated', 'true');
                localStorage.setItem('authToken', Date.now().toString());
                window.location.href = 'index.html?login=success';
            };
            if (input) {
                input.addEventListener('keypress', (e) => { if (e.key === 'Enter') doLogin(); });
            }
            const btn = document.querySelector('button[onclick="checkCode()"], button[type="submit"]');
            if (btn) {
                btn.onclick = (e) => { e.preventDefault(); doLogin(); };
            }
            if (localStorage.getItem('isAuthenticated') === 'true') {
                window.location.href = 'index.html';
            }
            window.checkCode = doLogin;
        })();
    </script>
</body>
</html>
