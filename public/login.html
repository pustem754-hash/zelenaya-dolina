<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Зелёная долина</title>
    <link rel="icon" type="image/png" href="icon-192x192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
        }

        h1 {
            color: #2c3e50;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #7f8c8d;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #2c3e50;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #2ecc71;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .error {
            display: none;
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 14px;
            text-align: center;
        }

        .loading {
            display: none;
            color: #2ecc71;
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <img src="icon-192x192.png" alt="Логотип" class="logo">
            <h1>Зелёная долина</h1>
            <p class="subtitle">Личный кабинет жильца</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="code">Код (последние 4 цифры л/с):</label>
                <input type="text" id="code" placeholder="1977" maxlength="4" required>
            </div>

            <button type="submit" class="btn">Войти</button>

            <div class="error" id="error"></div>
            <div class="loading" id="loading">Проверка данных...</div>
        </form>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const codeField = document.getElementById('code');
        const errorDiv = document.getElementById('error');
        const loadingDiv = document.getElementById('loading');

        // Авторизация
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const codeInput = codeField.value.trim();
            
            // Проверка длины кода
            if (codeInput.length !== 4) {
                errorDiv.textContent = 'Код должен содержать 4 цифры';
                errorDiv.style.display = 'block';
                return;
            }
            
            // Показываем загрузку
            errorDiv.style.display = 'none';
            loadingDiv.style.display = 'block';
            
            try {
                // Загружаем базу данных
                const response = await fetch('data/residents.json');
                if (!response.ok) throw new Error('Ошибка загрузки базы данных');
                const residents = await response.json();
                
                // Ищем жителя по коду
                const resident = residents.find(r => r.code === codeInput);
                
                if (resident) {
                    // Сохраняем данные пользователя
                    const userData = {
                        fio: resident.fio,
                        phone: resident.phone,
                        code: resident.code,
                        address: resident.address,
                        apartment: resident.apartment,
                        storage: resident.storage,
                        complex: resident.complex,
                        licSchet: resident.licSchet,
                        userId: resident.id
                    };
                    
                    localStorage.setItem('authToken', 'authenticated_' + Date.now());
                    localStorage.setItem('isAuthenticated', 'true');
                    localStorage.setItem('userPhone', resident.phone);
                    localStorage.setItem('userId', resident.id);
                    localStorage.setItem('userData', JSON.stringify(userData));
                    
                    // Редирект на главную
                    window.location.href = 'index.html?login=success';
                } else {
                    loadingDiv.style.display = 'none';
                    errorDiv.textContent = 'Неверный код';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                console.error('Ошибка авторизации:', error);
                loadingDiv.style.display = 'none';
                errorDiv.textContent = 'Ошибка загрузки данных';
                errorDiv.style.display = 'block';
            }
        });

        // Разрешить только цифры
        codeField.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        });
    </script>
</body>
</html>
