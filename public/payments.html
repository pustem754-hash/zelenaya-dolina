<!-- Модальное окно выбора банка -->
<div id="bankSelectionOverlay" class="modal-overlay">
    <div class="modal-card">
        <div class="modal-header">
            <div style="display:flex;gap:10px;align-items:center;">
                <span style="font-size:22px;">🏦</span>
                <div>
                    <div style="font-weight:800; font-size:18px;">Оплата через СБП</div>
                    <div style="color:#6B7280; font-size:13px;">Выберите банк или сохраните QR</div>
                </div>
            </div>
            <button class="btn btn-ghost" type="button" onclick="closeBankSelection()">✕</button>
        </div>
        <div id="bankGrid" class="bank-grid"></div>
        <div class="modal-actions">
            <button class="btn btn-secondary" type="button" onclick="closeBankSelection()">Отмена</button>

        </div>
    </div>
</div>

<script src="js/platform.js"></script>
<script src="js/interactions.js"></script>
<script>
    const SBP_BANKS = [
        { name: 'Сбербанк', icon: '🟢', scheme: 'sberbank://' },
        { name: 'Т-Банк (Тинькофф)', icon: '🟡', scheme: 'tinkoffbank://' },
        { name: 'ВТБ', icon: '🔵', scheme: 'vtb://' },
        { name: 'Альфа-Банк', icon: '🔴', scheme: 'alfabank://' },
        { name: 'Райффайзен', icon: '🟠', scheme: 'raiffeisen://' },
        { name: 'Газпромбанк', icon: '🔵', scheme: 'gazprombank://' },
        { name: 'РСХБ', icon: '🌾', scheme: 'rshb://' },
        { name: 'ПСБ', icon: '🟣', scheme: 'psb://' },
        { name: 'Home Bank', icon: '🏠', scheme: 'homecreditbank://' },
        { name: 'Совкомбанк', icon: '🟠', scheme: 'sovcombank://' },
        { name: 'Почта Банк', icon: '✉️', scheme: 'pochtabank://' },
        { name: 'Уралсиб', icon: '🟦', scheme: 'uralsib://' }
    ];
    const PAYMENT_AMOUNT = 4520;
    const MERCHANT_ID = 'uk_zelenaya_dolina';

    function openBankSelection(amount = PAYMENT_AMOUNT) {
        const overlay = document.getElementById('bankSelectionOverlay');
        const grid = document.getElementById('bankGrid');
        if (!overlay || !grid) return;
        grid.innerHTML = '';
        SBP_BANKS.forEach(bank => {
            const card = document.createElement('div');
            card.className = 'bank-card';
            card.innerHTML = `<div class="bank-icon">${bank.icon}</div><div class="bank-name">${bank.name}</div>`;
            card.onclick = () => openBankApp(bank, amount);
            grid.appendChild(card);
        });
        overlay.classList.add('visible');
        overlay.onclick = (e) => { if (e.target === overlay) closeBankSelection(); };
    }

    function closeBankSelection() {
        const overlay = document.getElementById('bankSelectionOverlay');
        if (overlay) overlay.classList.remove('visible');
    }

    function openBankApp(bank, amount = PAYMENT_AMOUNT) {
        const sbpUrl = `${bank.scheme}qr?amount=${amount}&merchant=${MERCHANT_ID}`;
        try { window.location.href = sbpUrl; } catch(e) { console.error(e); }
        showToast?.(`Открываем ${bank.name}...`);
        setTimeout(closeBankSelection, 1500);
    }

    function openSbpFallback() {
        closeBankSelection();
        alert('Покажите QR-код в приложении банка');
    }
</script>

    
    <div class="version">v6.8.2</div>
